<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F2EA" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Luna by Gloria" />
    <meta name="description" content="A premium daily wellness companion for understanding your body, energy, mood, and rhythm. Luna by Gloria." />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- iOS PWA cold-start splash images. iOS picks the matching one by
         device-specific media query so users never see a black flash
         between tapping the home screen icon and the HTML loading.
         Listed largest-to-smallest so iOS picks the most specific match. -->
    <link rel="apple-touch-startup-image" href="splash/iphone-1320x2868.png"
          media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1290x2796.png"
          media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1284x2778.png"
          media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1206x2622.png"
          media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1179x2556.png"
          media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1170x2532.png"
          media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1125x2436.png"
          media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1242x2688.png"
          media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-828x1792.png"
          media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-1242x2208.png"
          media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)" />
    <link rel="apple-touch-startup-image" href="splash/iphone-750x1334.png"
          media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2) and (orientation: portrait)" />
    <!-- Fallback for any device not matching above (older or future). -->
    <link rel="apple-touch-startup-image" href="splash/iphone-1170x2532.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400;1,6..72,500&family=DM+Sans:opsz,wght@9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@500&display=swap" rel="stylesheet" />
    <title>Luna by Gloria</title>
    <style>
      html, body { margin: 0; padding: 0; background: #F7F2EA; }
      /* Splash is visible by default — opacity 1, no entry animation.
         The brand mark needs to be on-screen the instant HTML parses,
         not animated in. Subhead has a tiny offset so it lands a beat
         after the mark, which feels intentional rather than slow.
         On dismiss, the whole splash scales up subtly while fading —
         feels like entering the app, not removing a curtain. */
      #luna-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #F7F2EA; color: #2B211C;
        transition: opacity 0.6s cubic-bezier(0.4, 0.0, 0.2, 1),
                    transform 0.6s cubic-bezier(0.4, 0.0, 0.2, 1);
        will-change: opacity, transform;
      }
      #luna-splash.gone {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }
      .luna-splash-mark {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic; font-weight: 300;
        font-size: 64px; letter-spacing: -2.5px;
        color: #6B4739; line-height: 1;
        /* Reserves layout but starts visible — no fade-in flicker.
           Slow ambient breath animation gives it gentle life. */
        opacity: 1;
        animation: lunaBreath 4s ease-in-out infinite;
      }
      @keyframes lunaBreath {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.85; }
      }
      .luna-splash-sub {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic; font-weight: 400;
        font-size: 17px;
        color: rgba(43,33,28,0.55);
        margin-top: 14px;
        animation: lunaSubIn 0.4s ease-out 0.25s both;
      }
      @keyframes lunaSubIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="luna-splash">
      <div class="luna-splash-mark">Luna.</div>
      <div class="luna-splash-sub">your daily body ritual.</div>
    </div>
    <div id="root"></div>
    <script>
      // Dismiss any keyboard / focused input persisted across reload
      // so the splash never shows up sharing the screen with a keyboard.
      try { document.activeElement && document.activeElement.blur && document.activeElement.blur() } catch (_) {}
      window.__lunaSplashStart = performance.now()
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
