<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/icon-192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F4EFE5" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Luna" />
    <meta name="description" content="A cycle tracker that interprets, not just logs. Phase-specific guidance grounded in peer-reviewed research." />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,700;1,6..72,300;1,6..72,400;1,6..72,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <title>Luna</title>
    <style>
      html, body { margin: 0; padding: 0; background: #F4EFE5; }
      #luna-splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #F4EFE5; color: #1A1310;
        transition: opacity 0.35s ease-out;
      }
      #luna-splash.gone { opacity: 0; pointer-events: none; }
      .luna-splash-mark {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic; font-weight: 300;
        font-size: 64px; letter-spacing: -2.5px;
        color: #C84E2E; line-height: 1;
        animation: lunaFadeIn 0.5s ease-out both;
      }
      .luna-splash-sub {
        font-family: 'Newsreader', Georgia, serif;
        font-style: italic; font-weight: 400;
        font-size: 17px;
        color: rgba(26,19,16,0.55);
        margin-top: 14px;
        animation: lunaFadeIn 0.5s ease-out 0.2s both;
      }
      @keyframes lunaFadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div id="luna-splash">
      <div class="luna-splash-mark">Luna.</div>
      <div class="luna-splash-sub">quietly yours.</div>
    </div>
    <div id="root"></div>
    <script>window.__lunaSplashStart = performance.now()</script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
