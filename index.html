<style>
/* Global styles for Luna & Still prototype canvas */
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #f0eee9;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

* { box-sizing: border-box; }

/* Phone screen scroll containers should not show scrollbars */
.phone-scroll {
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.phone-scroll::-webkit-scrollbar { display: none; }

/* Tap feedback */
.tap {
  cursor: pointer;
  transition: transform .12s ease, opacity .12s ease;
  -webkit-tap-highlight-color: transparent;
}
.tap:active { transform: scale(0.97); opacity: 0.85; }

/* Subtle breathing animation */
@keyframes breathe {
  0%, 100% { transform: scale(1); opacity: 0.85; }
  50%      { transform: scale(1.08); opacity: 1; }
}
.breathe { animation: breathe 6s ease-in-out infinite; }

@keyframes pulse-ring {
  0%   { transform: scale(0.95); opacity: 0.4; }
  100% { transform: scale(1.25); opacity: 0; }
}
.pulse-ring { animation: pulse-ring 3s ease-out infinite; }

@keyframes orbit-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.orbit { animation: orbit-spin 40s linear infinite; }

@keyframes fade-up {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.fade-up { animation: fade-up .35s ease-out both; }

</style>

// Tab bar — generic, accepts items
// ─────────────────────────────────────────────────────────────
function TabBar({ items, active, onChange, dark = false, accent = '#000', bg }) {
  return (
    <div style={{
      position: 'absolute', left: 0, right: 0, bottom: 0,
      paddingBottom: 18, paddingTop: 10,
      background: bg || (dark ? 'rgba(20,15,12,0.85)' : 'rgba(255,255,255,0.85)'),
      backdropFilter: 'blur(20px) saturate(180%)',
      WebkitBackdropFilter: 'blur(20px) saturate(180%)',
      borderTop: dark ? '0.5px solid rgba(255,255,255,0.08)' : '0.5px solid rgba(0,0,0,0.06)',
      display: 'flex', justifyContent: 'space-around',
      zIndex: 20,
    }}>
      {items.map((it) => {
        const on = active === it.key;
        return (
          <button key={it.key}
            onClick={() => onChange(it.key)}
            className="tap"
            style={{
              border: 'none', background: 'transparent', cursor: 'pointer',
              display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
              padding: '4px 8px',
              color: on ? accent : (dark ? 'rgba(255,255,255,0.55)' : 'rgba(0,0,0,0.42)'),
              fontFamily: 'inherit',
            }}>
            <div style={{ width: 22, height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {it.icon}
            </div>
            <span style={{ fontSize: 10, fontWeight: 500, letterSpacing: 0.1 }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Button
// ─────────────────────────────────────────────────────────────
function Button({ children, onClick, fill = '#1c1410', text = '#fff', style = {}, full, ghost, outline }) {
  const base = {
    border: 'none', cursor: 'pointer',
    padding: '14px 22px', borderRadius: 16,
    fontFamily: 'inherit', fontSize: 15, fontWeight: 600,
    letterSpacing: -0.1,
    width: full ? '100%' : undefined,
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
  };
  if (ghost) {
    return <button className="tap" onClick={onClick} style={{ ...base, background: 'transparent', color: fill, ...style }}>{children}</button>;
  }
  if (outline) {
    return <button className="tap" onClick={onClick} style={{ ...base, background: 'transparent', color: fill, border: `1px solid ${fill}`, ...style }}>{children}</button>;
  }
  return <button className="tap" onClick={onClick} style={{ ...base, background: fill, color: text, ...style }}>{children}</button>;
}

// ─────────────────────────────────────────────────────────────
// Quick log emoji tap-targets
// ─────────────────────────────────────────────────────────────
function EmojiTap({ emoji, label, active, onClick, accent, bg = 'transparent', textColor }) {
  return (
    <button className="tap"
      onClick={onClick}
      style={{
        border: 'none', cursor: 'pointer',
        background: active ? accent : bg,
        color: active ? '#fff' : (textColor || 'inherit'),
        padding: '10px 6px',
        borderRadius: 14,
        display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4,
        minWidth: 56, fontFamily: 'inherit',

      <span style={{ fontSize: 22, lineHeight: 1 }}>{emoji}</span>
      <span style={{ fontSize: 10, fontWeight: 500, opacity: active ? 1 : 0.7 }}>{label}</span>
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// useScreen — tiny in-prototype router
// ─────────────────────────────────────────────────────────────
function useScreen(initial) {
  const [screen, setScreen] = React.useState(initial);
  const [stack, setStack] = React.useState([initial]);
  const go = React.useCallback((next) => {
    setScreen(next);
    setStack((s) => [...s, next]);
  }, []);
  const back = React.useCallback(() => {
    setStack((s) => {
      if (s.length <= 1) return s;
      const ns = s.slice(0, -1);
      setScreen(ns[ns.length - 1]);
      return ns;
    });
  }, []);
  return { screen, go, back };
}

// ─────────────────────────────────────────────────────────────

}

// LunaEditorial — top-level app
// ─────────────────────────────────────────────────────────────
function LunaEditorial({ tweaks = {} }) {
  const theme = applyEditorialTweaks(EDITORIAL_THEME, tweaks);
  const [screen, setScreen] = React.useState('welcome');
  const [stack, setStack] = React.useState(['welcome']);
  const [logged, setLogged] = React.useState({ mood: null, symptoms: [], flow: null });
  const [phaseId, setPhaseId] = React.useState('ovulation');
  const [articleId, setArticleId] = React.useState(null);
  const [symptomId, setSymptomId] = React.useState(null);
  const cycleDay = 14;

  const go = (s) => { setScreen(s); setStack((st) => [...st, s]); };
  const back = () => setStack((st) => {
    if (st.length <= 1) return st;
    const ns = st.slice(0, -1);
    setScreen(ns[ns.length - 1]);
    return ns;
  });
  const openArticle = (id) => { setArticleId(id); go('article'); };
  const openSymptom = (id) => { setSymptomId(id); go('symptom'); };
  const openPhase = (id) => { setPhaseId(id); go('phase'); };

  const ctx = { theme, screen, go, back, logged, setLogged, cycleDay,
    phaseId, articleId, symptomId, openArticle, openSymptom, openPhase };

  return (
    <Phone width={360} height={720} bg={theme.bg}>
      <div style={{ position: 'absolute', inset: 0, background: theme.bg }}>
        {screen === 'welcome'  && <EdWelcome ctx={ctx} />}
        {screen === 'onb1'     && <EdOnb step={1} ctx={ctx} />}
        {screen === 'onb2'     && <EdOnb step={2} ctx={ctx} />}
        {screen === 'onb3'     && <EdOnb step={3} ctx={ctx} />}
        {screen === 'home'     && <EdHome ctx={ctx} />}
        {screen === 'phase'    && <EdPhaseDetail ctx={ctx} />}
        {screen === 'log'      && <EdLog ctx={ctx} />}
        {screen === 'symptom'  && <EdSymptomDetail ctx={ctx} />}
        {screen === 'calendar' && <EdCalendar ctx={ctx} />}
        {screen === 'insights' && <EdInsights ctx={ctx} />}
        {screen === 'library'  && <EdLibrary ctx={ctx} />}
        {screen === 'article'  && <EdArticle ctx={ctx} />}
        {screen === 'watch'    && <EdHealthWatch ctx={ctx} />}
        {screen === 'privacy'  && <EdPrivacy ctx={ctx} />}
        {screen === 'paywall'  && <EdPaywall ctx={ctx} />}
        {screen === 'settings' && <EdSettings ctx={ctx} />}
      </div>
      {['home', 'calendar', 'insights', 'library', 'settings'].includes(screen) && (
        <EdTabBar ctx={ctx} />
      )}
    </Phone>
  );
}

function applyEditorialTweaks(base, t) {
  const palettes = window.LUNA_PALETTES || {};
  const p = palettes[t.lunaPalette];
  if (!p) return base;
  return { ...base, accent: p.accent, bg: p.bg, subtle: p.subtle };
}

  const { theme } = ctx;

    <div className="fade-up phone-scroll" style={{ position: 'absolute', inset: 0, paddingBottom: 90, overflow: 'auto', background: theme.bg, color: theme.text }}>

            <div key={i} style={{ textAlign: 'center', fontSize: 9, color: theme.muted, fontFamily: theme.mono, fontWeight: 600, letterSpacing: 1 }}>{d}</div>
          ))}
        </div>

function OnbDate({ theme }) {
  const days = ['M', 'T', 'W', 'T', 'F', 'S', 'S'];
  const dates = Array.from({ length: 28 }, (_, i) => i + 1);
  const selected = 6;
  return (
    <div>
      <div style={{
        background: theme.card, padding: 16, borderRadius: theme.radius,
        boxShadow: '0 1px 3px rgba(0,0,0,0.04)',
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14, fontFamily: theme.sans }}>
          <span style={{ fontWeight: 600, fontSize: 14 }}>October 2025</span>
          <span style={{ color: theme.muted, fontSize: 13 }}>‹ ›</span>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4, marginBottom: 6 }}>
          {days.map((d, i) => (
            <div key={i} style={{ textAlign: 'center', fontSize: 10, color: theme.muted, fontFamily: theme.sans }}>{d}</div>
          ))}
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 4 }}>
          {dates.map((d) => (
            <div key={d} style={{
              aspectRatio: '1', display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 13, fontFamily: theme.sans, fontWeight: d === selected ? 600 : 400,
              background: d === selected ? theme.accent : 'transparent',
              color: d === selected ? '#fff' : theme.text,
              borderRadius: theme.radius,
            }}>{d}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

function OnbCycle({ theme }) {
  const [val, setVal] = React.useState(28);
  return (
    <div>
      <div style={{ textAlign: 'center', marginBottom: 28 }}>
        <span style={{ fontFamily: theme.serif, fontSize: 96, fontWeight: 300, color: theme.accent, lineHeight: 1 }}>{val}</span>
        <span style={{ fontFamily: theme.sans, fontSize: 14, color: theme.muted, marginLeft: 8 }}>days</span>
      </div>
      <input type="range" min={21} max={45} value={val} onChange={(e) => setVal(+e.target.value)}
        style={{ width: '100%', accentColor: theme.accent }} />
      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: theme.muted, marginTop: 6, fontFamily: theme.sans }}>
        <span>21</span><span>33</span><span>45</span>
      </div>
    </div>
  );
}
